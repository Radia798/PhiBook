{% extends 'main/base.html' %}
{% block content %}

<h2 class="text-2xl font-bold mb-4">My Posts</h2>

{% for post in posts %}
<div class="bg-white p-4 rounded shadow mb-4">
    <p>{{ post.text }}</p>

    <div class="mt-2 space-x-4">
        <a href="{% url 'edit_post' post.id %}" class="text-blue-600">Edit</a>
        <a href="{% url 'delete_post' post.id %}" class="text-red-600">Delete</a>
    </div>
</div>
{% empty %}
<p>You have no posts.</p>
{% endfor %}

{% endblock %}
