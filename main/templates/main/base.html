<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PhiBook</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<nav class="bg-blue-600 text-white p-4 flex justify-between">
    <h1 class="text-xl font-bold">PhiBook</h1>
    <div class="space-x-4">
        {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}" class="hover:underline">Dashboard</a>
            <a href="{% url 'add_post' %}" class="hover:underline">Add Post</a>
            <a href="{% url 'my_posts' %}" class="hover:underline">My Posts</a>
            <a href="{% url 'edit_profile' %}" class="hover:underline">Profile</a>
            <a href="{% url 'logout' %}" class="hover:underline">Logout</a>
        {% else %}
            <a href="{% url 'login' %}" class="hover:underline">Login</a>
            <a href="{% url 'register' %}" class="hover:underline">Register</a>
        {% endif %}
    </div>
</nav>

<div class="max-w-3xl mx-auto mt-6 px-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
